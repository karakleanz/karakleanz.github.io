    <style> 
      .responsive-image {
          width: 100%; /* Take the full width of the container */
          max-width: 800px; /* Optional: Set a maximum width */
          margin: 0 auto; /* Center the image if a max-width is set */
          overflow: hidden; /* Hide overflow */
      }
      
      .responsive-image img {
          width: 100%; /* Image takes the full width of the div */
          height: auto; /* Maintain aspect ratio */
          display: block; /* Prevent any space below the image */
      }
    </style> 
  </head> 
  <body> 
    <div class="responsive-image">
        <img src="Capture1.PNG" alt="Description of image" />
    </div>
    <div class="responsive-image">
        <img src="Capture2.PNG" alt="Description of image" />
    </div>
    <div class="responsive-image">
        <img src="Capture3.PNG" alt="Description of image" />
    </div>
    <div class="responsive-image">
        <img src="Capture4.PNG" alt="Description of image" />
    </div>
  </body>
